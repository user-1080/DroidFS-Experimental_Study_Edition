name: Manifest Prüfung - Manifest Extraktion
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Java JDK 17 aufbauen
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Motor (Gradle) starten
      run: chmod +x gradlew
      
    - name: App komplett bauen und Manifest generieren
      run: ./gradlew assembleRelease
      
    - name: Fertige APK und Manifest sichern
      uses: actions/upload-artifact@v4
      with:
        name: DroidFS-ExperimentelleVer1.0.undManifest
        path: |
          app/build/outputs/apk/release/*.apk
          app/build/intermediates/merged_manifest*/**/AndroidManifest.xml
